  <script>
    const designerLayer = document.getElementById('designer-layer');
const trigger = document.getElementById('split-trigger');
const designerContent = document.querySelector('.left-side .content-box');
const coderContent = document.querySelector('.right-side .content-box');

trigger.style.cursor = "pointer";

// Navigation
trigger.addEventListener('click', () => {
  window.location.href = "portfolio.html";
});

trigger.addEventListener('mousemove', (e) => {
  const mouseX = (e.clientX / window.innerWidth) * 100;
  let splitPoint = mouseX;

  // Logic for the "Center Deadzone" (40% to 60%)
  if (mouseX >= 40 && mouseX <= 60) {
    splitPoint = 50;
    setVisuals(0, 1, 0, 1); // Reset both sides
  } 
  else if (mouseX < 40) {
    setVisuals(8, 0.3, 0, 1); // Blur Left
  } 
  else {
    setVisuals(0, 1, 8, 0.3); // Blur Right
  }

  designerLayer.style.clipPath = `inset(0 ${100 - splitPoint}% 0 0)`;
});

// Helper function to keep code clean
function setVisuals(dBlur, dOpac, cBlur, cOpac) {
  designerContent.style.filter = `blur(${dBlur}px)`;
  designerContent.style.opacity = dOpac;
  coderContent.style.filter = `blur(${cBlur}px)`;
  coderContent.style.opacity = cOpac;
}

trigger.addEventListener('mouseleave', () => {
  designerLayer.style.clipPath = `inset(0 50% 0 0)`;
  setVisuals(0, 1, 0, 1);
});

    
  </script>
