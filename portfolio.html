  <script>
      function filterSelection(c) {
          const container = document.getElementById("portfolioContainer");
          const items = document.getElementsByClassName("item");
          const btns = document.getElementsByClassName("filter-btn");

          if (c === 'all') {
              container.classList.add('is-train');
              container.classList.remove('is-grid');
          } else {
              container.classList.remove('is-train');
              container.classList.add('is-grid');
          }

          for (let btn of btns) {
              btn.classList.remove("active");
              if (btn.innerText.toLowerCase().includes(c)) {
                  btn.classList.add("active");
              }
          }

          for (let i = 0; i < items.length; i++) {
              items[i].classList.remove("hide");
              if (c !== 'all' && !items[i].classList.contains(c)) {
                  items[i].classList.add("hide");
              }
          }
      }

      const observer = new IntersectionObserver((entries) => {
          if (!document.getElementById("portfolioContainer").classList.contains('is-train')) return;
          entries.forEach(entry => {
              if (entry.isIntersecting) {
                  document.querySelectorAll('.item').forEach(el => el.classList.remove('is-centered'));
                  entry.target.classList.add('is-centered');
              }
          });
      }, { threshold: 0.6, rootMargin: "0px -20% 0px -20%" });

      document.querySelectorAll('.item').forEach(item => observer.observe(item));
  </script>
